spring.application.name=fruitshopp

# Server port - Railway sets the PORT env variable
server.port=${PORT:8080}

# Database Connection (uses Railway MySQL variables)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=10000&socketTimeout=60000
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool settings
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.schema_update.unique_constraint_strategy=skip
spring.jpa.open-in-view=false

# CORS Allowed Origins - set ALLOWED_ORIGINS env var in Railway/Vercel if needed
app.allowed-origins=${ALLOWED_ORIGINS:https://fruitshopp.vercel.app,http://localhost:3000,http://localhost:3001,http://localhost:3005}

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Serve uploaded files from the /uploads/ directory
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# Actuator health endpoint for Railway health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
