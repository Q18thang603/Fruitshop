spring.application.name=fruitshopp

# Database Connection (uses Railway MySQL variables)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.schema_update.unique_constraint_strategy=skip

# CORS Allowed Origins
app.allowed-origins=${ALLOWED_ORIGINS:${FRONTEND_URL:http://localhost:3000,http://localhost:3001,http://localhost:3005}}

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Serve uploaded files from the /uploads/ directory
spring.web.resources.static-locations=classpath:/static/,file:uploads/
