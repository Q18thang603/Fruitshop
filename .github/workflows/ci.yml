name: FruitShop Fullstack CI

on:
  push:
    branches:
      - main

jobs:

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fruitshop-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: CI=false npm run build

  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fruitshopp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: ./mvnw clean install -DskipTests